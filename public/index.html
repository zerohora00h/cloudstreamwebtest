<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudstream Web</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-base-200 min-h-screen font-sans">

    <!-- Navbar -->
    <div class="navbar bg-base-100 shadow-xl sticky top-0 z-50">
        <div class="flex-1">
            <a class="btn btn-ghost text-xl text-primary font-bold">
                <i class="fa-solid fa-cloud"></i> Cloudstream Web
            </a>
        </div>
        <div class="flex-none gap-2">
            <select id="plugin-selector" class="select select-bordered select-sm max-w-xs">
                <option disabled selected>Carregando plugins...</option>
            </select>
            <div class="form-control">
                <div class="input-group">
                    <input type="text" id="search-input" placeholder="Buscar..."
                        class="input input-bordered input-sm w-24 sm:w-64" />
                    <button id="search-btn" class="btn btn-square btn-sm btn-primary">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container mx-auto p-4 md:p-8">
        <!-- Error/Loading Messages -->
        <div id="status-container" class="mb-6 hidden"></div>

        <!-- Home/Search Grid -->
        <div id="media-grid-container" class="space-y-8">
            <!-- Dynamic Content goes here -->
        </div>

        <!-- Details Modal -->
        <dialog id="details-modal" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box w-11/12 max-w-5xl h-[90vh] flex flex-col p-0 overflow-hidden bg-base-100">
                <form method="dialog">
                    <button
                        class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2 z-10 text-white bg-black/50 hover:bg-black/80">✕</button>
                </form>

                <!-- Modal Content -->
                <div id="modal-content" class="flex-1 overflow-y-auto">
                    <!-- Dynamic Details -->
                </div>
            </div>
            <form method="dialog" class="modal-backdrop">
                <button>close</button>
            </form>
        </dialog>
    </main>

    <script src="app.js"></script>
</body>

</html>
